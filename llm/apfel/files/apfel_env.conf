# See https://github.com/Arthur-Ficial/apfel/blob/main/docs/cli-reference.md
# for environment variables recognized by apfel

# Service must run as a user with Apple Intelligence enabled.
# The wrapper script reads APFEL_USER variable and runs the service as this user.
# It can be a user id with a leading # or a user name. 501 is usually (but not guaranteed) the primary user.
APFEL_USER="#501"

#APFEL_HOST=127.0.0.1
#APFEL_PORT=11434
#APFEL_TOKEN=""
#APFEL_SYSTEM_PROMPT=""
#APFEL_TEMPERATURE=
#APFEL_MAX_TOKENS=
#APFEL_MCP=
#APFEL_MCP_TOKEN=
#APFEL_MCP_TIMEOUT=
#APFEL_DEBUG=
